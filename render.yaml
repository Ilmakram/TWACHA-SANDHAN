services:
  - type: web
    name: dermatological-manifestation-backend
    env: python
    plan: free
    branch: main
    root: backend1
    runtime: python-3.11.18
    buildCommand: python -m pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
